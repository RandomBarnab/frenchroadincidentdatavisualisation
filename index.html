<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mode Diagnostic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; margin: 0; }
        #debugBox { width: 100%; height: 85vh; background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; border: none; font-size: 15px; resize: none; }
        h1 { color: #333; margin-top: 0; }
        .instruction { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #667eea; }
    </style>
</head>
<body>
    <div class="instruction">
        <h1>🛠️ Mode Diagnostic Auto</h1>
        <p>Veuillez patienter pendant l'analyse... Une fois terminée, <b>sélectionnez tout le texte dans le cadre noir, copiez-le et envoyez-le moi !</b></p>
    </div>
    <textarea id="debugBox" readonly>Initialisation du diagnostic...\n</textarea>
    
    <script>
        function log(msg) {
            const box = document.getElementById('debugBox');
            box.value += msg + "\n";
            box.scrollTop = box.scrollHeight;
        }

        // On ne teste que 2024 pour que le diagnostic soit rapide
        const FILES = [
            { type: 'caracteristiques', url: 'data/caracteristiques-2024.csv' },
            { type: 'usagers', url: 'data/usagers-2024.csv' }
        ];

        let allData = {};
        let processed = 0;

        log("Début du téléchargement des fichiers 2024...");

        FILES.forEach(f => {
            Papa.parse(f.url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                transformHeader: h => h.replace(/^\uFEFF/, '').replace(/^"|"$/g, '').trim(),
                transform: v => v ? v.trim() : v,
                complete: function(res) {
                    allData[f.type] = res.data;
                    log(`\n[OK] Fichier: ${f.url}`);
                    log(` -> Lignes lues : ${res.data.length}`);
                    if(res.data.length > 0) {
                        let cols = Object.keys(res.data[0]);
                        log(` -> Colonnes trouvées (${cols.length}) : ${cols.slice(0, 5).join(', ')}...`);
                        
                        // Détection d'une erreur 404 cachée (page HTML renvoyée au lieu du CSV)
                        if (cols[0] && cols[0].toLowerCase().includes('<html')) {
                            log(` ❌ ALERTE : Ce n'est pas un CSV ! GitHub a renvoyé une page d'erreur 404. Le fichier n'existe pas à ce chemin.`);
                        }
                    } else {
                        log(` ❌ ALERTE : Le fichier est vide !`);
                    }
                    checkDone();
                },
                error: function(err) {
                    log(`\n[ERREUR RESEAU] Impossible de trouver ${f.url}`);
                    checkDone();
                }
            });
        });

        function checkDone() {
            processed++;
            if(processed === FILES.length) {
                log("\n" + "=".repeat(50));
                log("--- DÉBUT DE LA SIMULATION DU FILTRAGE ---");
                log("=".repeat(50) + "\n");
                runSimulation();
            }
        }

        function runSimulation() {
            let carac = allData['caracteristiques'] || [];
            let usagers = allData['usagers'] || [];
            
            log(`Total Usagers bruts : ${usagers.length}`);
            
            // Étape 1 : Filtre des blessés
            let usagersFiltres = usagers.filter(u => u.grav !== '1');
            log(`Usagers après retrait des indemnes : ${usagersFiltres.length}`);
            
            if (usagers.length > 0 && usagersFiltres.length === 0) {
                log(`\n⚠️ CRITIQUE : Tous les usagers ont disparu. Exemple de valeur u.grav lue : '${usagers[0].grav}'`);
                log(`(Si c'est 'undefined', c'est que la colonne 'grav' n'a pas été reconnue)`);
            }

            // Étape 2 : Récupération des Num_Acc
            let accidentsIdsSet = new Set(usagersFiltres.map(u => u.Num_Acc));
            log(`IDs d'accidents uniques retenus : ${accidentsIdsSet.size}`);
            
            // Étape 3 : Croisement avec les caractéristiques
            let accidentsFiltres = carac.filter(acc => accidentsIdsSet.has(acc.Num_Acc));
            log(`Accidents correspondants trouvés dans caractéristiques : ${accidentsFiltres.length}`);
            
            if (accidentsIdsSet.size > 0 && accidentsFiltres.length === 0) {
                let sampleUsagerId = Array.from(accidentsIdsSet)[0];
                let sampleAccId = carac.length > 0 ? carac[0].Num_Acc : 'aucun';
                log(`\n⚠️ CRITIQUE : Les IDs ne matchent pas entre les 2 fichiers !`);
                log(` -> ID cherché (Usager) : '${sampleUsagerId}'`);
                log(` -> ID disponible (Carac) : '${sampleAccId}'`);
            }

            // Étape 4 : Coordonnées GPS
            let accWithCoords = accidentsFiltres.filter(acc => {
                if (!acc.lat || !acc.long) return false;
                const lat = parseFloat(acc.lat.replace(',', '.'));
                const long = parseFloat(acc.long.replace(',', '.'));
                return !isNaN(lat) && !isNaN(long) && lat !== 0;
            });
            
            log(`Accidents avec coordonnées GPS valides pour la carte : ${accWithCoords.length}`);
            
            if (accidentsFiltres.length > 0 && accWithCoords.length === 0) {
                let sampleLat = accidentsFiltres[0].lat;
                let sampleLong = accidentsFiltres[0].long;
                log(`\n⚠️ CRITIQUE : Coordonnées invalides !`);
                log(` -> Exemple lu : lat='${sampleLat}', long='${sampleLong}'`);
            }

            log("\n✅ DIAGNOSTIC TERMINÉ.");
        }
    </script>
</body>
</html>
